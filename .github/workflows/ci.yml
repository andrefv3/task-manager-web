name: Kynetic Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint Check (Fast CI)
        run: npm run lint

      - name: Type Check (TypeScript)
        # We use Vite's script to validate types without generating files
        run: npx tsc --noEmit

      - name: Build Project
        # This ensures that Vite can bundle everything for production
        run: npm run build